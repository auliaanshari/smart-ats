version: "3.8"

services:
  tf-serving:
    image: tensorflow/serving:latest
    container_name: smart-ats-serving
    ports:
      - "8501:8501" # Port standard REST API TF Serving
    volumes:
      - ./serving_model_dir/smart-ats-model:/models/smart-ats-model
    environment:
      - MODEL_NAME=smart-ats-model
